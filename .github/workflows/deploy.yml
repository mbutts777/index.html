name: Deploy Website to S3

on:
  push:
    branches:
      - main  # Triggers the upload every time you push code to your main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1  # Change this if your bucket is in a different region

    - name: Deploy files to S3
      run: |
        aws s3 sync . s3://moiraresumesite --delete
    - name: Deploy files to S3
      run: |
        aws s3 sync . s3://moiraresumesite --delete --exclude ".git/*" --exclude ".github/*"
    - name: Deploy to S3
      run: aws s3 sync ./dist s3://your-bucket-name --delete

    - name: Clear CloudFront Cache
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/*"
